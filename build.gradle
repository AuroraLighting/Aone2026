cat > /etc/systemd/system/monitor-web.service << 'EOF'
[Unit]
Description=Aurora Monitoring Web UI
After=network.target mysql.service
Wants=mysql.service

[Service]
Type=simple
User=root
WorkingDirectory=/opt/monitoring
EnvironmentFile=/etc/aurora/env
ExecStart=/opt/monitoring/venv/bin/python -u /opt/monitoring/app.py
Restart=always
RestartSec=3

[Install]
WantedBy=multi-user.target
EOF

systemctl daemon-reload
systemctl restart monitor-web
sleep 5
curl -s -o /dev/null -w "%{http_code}\n" http://127.0.0.1:5000/ --max-time 5
